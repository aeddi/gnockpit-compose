name: gnockpit

services:
    gnockpit:
        build:
            context: ${GNOCKPIT_CONTEXT:-https://github.com/gnoverse/gnockpit.git#main}
            dockerfile_inline: |
                FROM golang:1.25-alpine AS builder
                WORKDIR /app
                COPY go.mod go.sum ./
                RUN --mount=type=cache,target=/go/pkg/mod go mod download
                COPY . .
                RUN --mount=type=cache,target=/go/pkg/mod \
                    --mount=type=cache,target=/root/.cache/go-build \
                    CGO_ENABLED=0 go build \
                      -ldflags="-s -w" \
                      -o /gnockpit .
                FROM alpine:3
                RUN apk add --no-cache ca-certificates docker-cli
                COPY --from=builder /gnockpit /usr/local/bin/gnockpit
                EXPOSE 8080
                ENTRYPOINT ["gnockpit"]
                CMD ["web"]
        image: gnockpit:local
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ${GNOLAND_DATA_DIR:-./gnoland-data}:/gnoland-data:ro
            - ${GENESIS_PATH:-./gnoland-data/genesis.json}:/genesis.json:ro
            - gnockpit-data:/data
        ports:
            - '${GNOCKPIT_LADDR:-0.0.0.0}:${GNOCKPIT_PORT:-8080}:8080'
        command:
            - web
            - --rpc
            - ${RPC_URL:-http://gnoland:26657}
            - --container
            - ${GNOLAND_CONTAINER:-gnoland}
            - --data-dir
            - /gnoland-data
            - --genesis
            - /genesis.json
            - --names
            - /data/names.json
            - --db-path
            - /data/gnockpit.db
            - --chain-stuck-secs
            - '${CHAIN_STUCK_SECS:-30}'
            - --missed-blocks-pct
            - '${MISSED_BLOCKS_PCT:-5}'
            - --notify
            - '${NOTIFY_URLS:-}'
        networks:
            - default
            - gnoland
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: 100m
                max-file: '1'

    signal-api:
        image: bbernhard/signal-cli-rest-api:latest
        environment:
            - MODE=normal
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - signal-data:/home/.local/share/signal-cli
        ports:
            - '${SIGNAL_API_LADDR:-127.0.0.1}:${SIGNAL_API_PORT:-8081}:8080'
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: 100m
                max-file: '1'

    signal-relay:
        image: python:3-alpine
        command: ["python3", "-u", "-c", "
import http.server, json, urllib.request, urllib.error, sys

class Handler(http.server.BaseHTTPRequestHandler):
    def do_POST(self):
        data = json.loads(self.rfile.read(int(self.headers['Content-Length'])))
        if isinstance(data.get('recipients'), str):
            data['recipients'] = [data['recipients']]
        req = urllib.request.Request('http://signal-api:8080/v2/send', json.dumps(data).encode(), {'Content-Type': 'application/json'})
        try:
            resp = urllib.request.urlopen(req)
            body = resp.read()
            self.send_response(resp.status)
        except urllib.error.HTTPError as e:
            body = e.read()
            self.send_response(e.code)
        self.send_header('Content-Type', 'application/json')
        self.end_headers()
        self.wfile.write(body)

print('signal-relay listening on :8082', flush=True)
http.server.HTTPServer(('', 8082), Handler).serve_forever()
"]
        depends_on:
            - signal-api
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: 10m
                max-file: '1'

volumes:
    gnockpit-data:
    signal-data:

networks:
    gnoland:
        name: ${GNOLAND_NETWORK:-gno-validator_default}
        external: true
